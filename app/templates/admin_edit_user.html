{% extends "base.html" %}

{% block content %}

<!-- PAGE HEADER -->
<div class="card">
  <h2>Edit User</h2>
  <p class="subtitle">Admin account management</p>
</div>

<!-- EDIT USER FORM -->
<div class="card">

  <!-- Show any error or success messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <!-- Form submits to the edit_user route in admin.py -->
  <form method="POST">

    <!-- Pre-filled with the user's current username -->
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" value="{{ user.username }}" required>
    </div>

    <!-- Pre-filled with the user's current email -->
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" value="{{ user.email }}" required>
    </div>

    <!-- Password is left blank by default, only filled in if the admin wants to change it -->
    <div class="form-group">
      <label>New Password (leave blank to keep current one)</label>
      <input type="password" name="new_password">
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;">
      <!-- Save button submits the form -->
      <button class="btn" type="submit">Save User</button>
      <!-- Cancel goes back to the admin dashboard without saving -->
      <a class="btn" href="{{ url_for('admin.admin_dashboard') }}" style="background:#111827; text-decoration:none;">
        Cancel
      </a>
    </div>

  </form>

</div>

{% endblock %}
