<!doctype html>
<html>
<head>
  <title>InsightKPI | Add KPI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="topbar">
  <div class="topbar__inner">
    <div class="brand">InsightKPI</div>
    <div class="nav-links">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/dashboard">Dashboard</a>
      <a class="nav-link primary" href="/kpi/add">Add KPI</a>
      <a class="nav-link" href="/logout">Logout</a>
    </div>
  </div>
</div>

<div class="container">

  <div class="card">
    <h2>Add KPI</h2>
    <p class="subtitle">Track a key business metric in seconds</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post" class="form">

      <div class="form-group">
        <label>KPI Name</label>
        <input name="kpi_name" placeholder="Sales, Profit, Customers..." required>
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" name="kpi_date" required>
      </div>

      <div class="form-group">
        <label>Value</label>
        <input name="value" placeholder="e.g. 1200" required>
      </div>

      <div class="form-group">
        <label>Target (optional)</label>
        <input name="target_value" placeholder="e.g. 1500">
      </div>

      <div class="form-group">
        <label>Notes (optional)</label>
        <input name="notes" placeholder="Any context...">
      </div>

      <button class="btn">Save KPI</button>

    </form>

  </div>

</div>

</body>
</html>
