{% extends "base.html" %}

{% block content %}

<div class="card">
  <h2>{{ "Edit KPI" if mode == "edit" else "Add KPI" }}</h2>
  <p class="subtitle">Track your business performance with meaningful metrics</p>
</div>

<div class="card" style="max-width:900px; margin:auto;">

  <form method="POST">

    <div class="form-group">
      <label>KPI Name</label>
      <input name="kpi_name"
             value="{{ entry.kpi_name if entry else '' }}"
             placeholder="e.g. Revenue, Sales, Customer Growth"
             required>
    </div>

    <div class="form-group">
      <label>Date</label>
      <input type="date"
             name="kpi_date"
             value="{{ entry.kpi_date.strftime('%Y-%m-%d') if entry else '' }}"
             required>
    </div>

    <div class="form-group">
      <label>Value</label>
      <input type="number"
             step="0.01"
             name="value"
             value="{{ entry.value if entry else '' }}"
             required>
    </div>

    <div class="form-group">
      <label>Target (optional)</label>
      <input type="number"
             step="0.01"
             name="target_value"
             value="{{ entry.target_value if entry else '' }}">
    </div>

    <div class="form-group">
      <label>Direction</label>
      <select name="direction">
        <option value="higher"
          {% if entry and entry.direction == "higher" %}selected{% endif %}>
          Higher is better (e.g. Revenue)
        </option>
        <option value="lower"
          {% if entry and entry.direction == "lower" %}selected{% endif %}>
          Lower is better (e.g. Expenses)
        </option>
      </select>
    </div>

    <div class="form-group">
      <label>Tolerance %</label>
      <input type="number"
             step="1"
             name="tolerance_pct"
             value="{{ entry.tolerance_pct if entry else 5 }}">
      <small style="color: var(--muted);">
        How close to target counts as "warning" (amber)
      </small>
    </div>

    <div class="form-group">
      <label>Notes (optional)</label>
      <input name="notes"
             value="{{ entry.notes if entry else '' }}">
    </div>

    <button class="btn" style="width:100%; margin-top:15px;">
      {{ "Update KPI" if mode == "edit" else "Save KPI" }}
    </button>

  </form>

</div>

{% endblock %}
