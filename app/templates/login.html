<!doctype html>
<html>
<head>
  <title>InsightKPI | Login</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="topbar">
  <div class="topbar__inner">
    <div class="brand">
      <span class="brand-badge"></span>
      InsightKPI
    </div>
    <div class="nav-links">
      <a class="nav-link primary" href="/register">Register</a>
    </div>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>Welcome back</h2>
    <p class="subtitle">Login to view your KPI dashboard and export reports.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" class="form">
      <div>
        <label class="label">Email</label>
        <input class="input" name="email" type="email" placeholder="name@company.com" required>
      </div>

      <div>
        <label class="label">Password</label>
        <input class="input" name="password" type="password" placeholder="Your password" required>
      </div>

      <button class="btn" type="submit">Login</button>

      <p class="small">
        New here?
        <a href="/register">Create an account</a>
      </p>
    </form>
  </div>
</div>

</body>
</html>
